version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: interior-postgres
    restart: always
    environment:
      POSTGRES_DB: somssi_interior
      POSTGRES_USER: somssi
      POSTGRES_PASSWORD: Somssi!Interior2026
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U somssi -d somssi_interior"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interior-checklist
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://somssi:Somssi!Interior2026@db:5432/somssi_interior
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
