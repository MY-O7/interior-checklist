version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interior-checklist
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/prisma
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db-data:
